name: clashofclans
description: A new Flutter project.

publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  provider: ^6.1.2
  http: ^1.2.2
  flutter_bloc: ^9.0.0
  path_provider: ^2.1.5
  shared_preferences: ^2.3.4
  url_launcher: ^6.3.1
  cached_network_image: ^3.4.1
  firebase_core: ^3.10.1
  firebase_database: ^11.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter

flutter:
  uses-material-design: true

  assets:
    - assets/icons/achievements/
    - assets/icons/troops/
    - assets/icons/heroes/
    - assets/icons/spells/
    - assets/icons/statistics/
    - assets/icons/builder_base/
    - assets/icons/home_base/
